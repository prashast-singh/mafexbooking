# Nginx site config for Mafex room booking.
# 1. Replace YOUR_DOMAIN with your hostname (e.g. rooms.uni-marburg.de).
# 2. Copy to /etc/nginx/sites-available/mafex and symlink sites-enabled.
# 3. sudo nginx -t && sudo systemctl reload nginx
# 4. HTTPS: sudo certbot --nginx -d YOUR_DOMAIN

upstream mafex_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

upstream mafex_web {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 25M;

    location /api/ {
        proxy_pass http://mafex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/ {
        proxy_pass http://mafex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://mafex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://mafex_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
